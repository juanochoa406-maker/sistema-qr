services:
  database:
    image: mysql:8.0
    container_name: base_datos_qr
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: 'rootpassword'
      MYSQL_DATABASE: 'validacion_qr'
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: aplicacion_qr
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy